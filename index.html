<body>
    <!-- Header - Navbar -->
    <header class="header" aria-labelledby="site-title">
        <div class="header__container">
            <h1 class="header__title" id="site-title" data-i18n="nav.title"></h1>
            <nav class="header__nav" aria-label="Navegación principal">

                    <li class="header__menu-item">
                        <a class="header__menu-link" href="#services" data-i18n="nav.services"></a>
                    </li>
                    <li class="header__menu-item">

    <main class="main">
        <!-- Perfil -->
        <section class="main__section profile" data-aos="fade-down" aria-labelledby="profile-name">
            <div class="profile__container">
                <img class="profile__image" src="./assets/img/logos/azocarone.svg" alt="José Antonio Azócar Marcano" aria-hidden="true">
                <div class="profile__content">
                    <h2 id="profile-name" class="profile__name">José Antonio Azócar Marcano</h2>
                    <h3 class="profile__title" data-i18n="profile.title"></h3>
                    <ul class="profile__links">
                        <li>
                            <a class="profile__link" href="https://curriculum.joseazocar.pro/" target="_blank" rel="noopener noreferrer"
                                data-i18n="profile.linkTitle">
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- About -->
        <section class="main__section about" id="about" data-aos="fade-up" aria-labelledby="about-title">
            <h2 id="about-title" class="about__title" data-i18n="about.title"></h2>
            <p class="about__description" data-i18n="about.description1"></p>
            <p class="about__description" data-i18n="about.description2"></p>
            <p class="about__description" data-i18n="about.description3"></p>
        </section>

        <!-- Education -->
        <section class="main__section education" id="education" data-aos="fade-up" aria-labelledby="education-title">
            <h2 id="education-title" class="education__title" data-i18n="education.title"></h2>
            <ul class="education__list">
                <li class="education__item" data-item-id="uc3m">
                    <div class="education__logo" data-logo-id="uc3m">
                        <img class="education__logo-image" src="./assets/img/logos/uc3m.png" alt="Logo Universidad Carlos III de Madrid">
                    </div>
                    <h3 class="education__degree" data-i18n="education.items.uc3m.degree"></h3>
                    <a class="education__institution" href="https://www.uc3m.es/postgrado/inicio" target="_blank" rel="noopener noreferrer"
                        data-i18n="education.items.uc3m.institution">
                    </a>
                </li>
                <li class="education__item" data-item-id="uah">
                    <div class="education__logo" data-logo-id="uah">
                        <img class="education__logo-image" src="./assets/img/logos/uah.png" alt="Logo Universidad Alejandro de Humboldt">
                    </div>
                    <h3 class="education__degree" data-i18n="education.items.uah.degree"></h3>
                    <a class="education__institution" href="https://unihumboldt.edu.ve/" target="_blank" rel="noopener noreferrer"
                        data-i18n="education.items.uah.institution">
                    </a>
                </li>
                <li class="education__item" data-item-id="iunp">
                    <div class="education__logo" data-logo-id="iunp">
                        <img class="education__logo-image" src="./assets/img/logos/iunp.png" alt="Logo Instituto Universitario de Nuevas Profesiones">
                    </div>
                    <h3 class="education__degree" data-i18n="education.items.iunp.degree"></h3>
                    <a class="education__institution" href="https://www.iunp.edu.ve/" target="_blank" rel="noopener noreferrer"
                        data-i18n="education.items.iunp.institution">
                    </a>
                </li>
            </ul>
        </section>

        <!-- Services -->
        <section class="main__section services" id="services" data-aos="fade-up" aria-labelledby="services-title">
            <h2 id="services-title" class="services__title" data-i18n="services.title"></h2>
            <ul class="services__list">
                <li class="services__item" data-aos="flip-left">
                    <i class="services__item-icon fas fa-network-wired fa-2x" aria-hidden="true"></i>
                    <h3 class="services__item-title" data-i18n="services.items.networks.title"></h3>
                    <p class="services__item-tagline" data-i18n="services.items.networks.tag"></p>
                    <p class="services__item-description" data-i18n="services.items.networks.description"></p>
                </li>
                <li class="services__item" data-aos="flip-left">
                    <i class="services__item-icon fas fa-gears fa-2x" aria-hidden="true"></i>
                    <h3 class="services__item-title" data-i18n="services.items.systems.title"></h3>
                    <p class="services__item-tagline" data-i18n="services.items.systems.tag"></p>
                    <p class="services__item-description" data-i18n="services.items.systems.description"></p>
                </li>
                <li class="services__item" data-aos="flip-left">
                    <i class="services__item-icon fas fa-shield-halved fa-2x" aria-hidden="true"></i>
                    <h3 class="services__item-title" data-i18n="services.items.security.title"></h3>
                    <p class="services__item-tagline" data-i18n="services.items.security.tag"></p>
                    <p class="services__item-description" data-i18n="services.items.security.description"></p>
                </li>
            </ul>
        </section>

        <!-- Proyectos -->
        <section class="main__section projects" id="projects" data-aos="fade-up" aria-labelledby="projects-title">
            <h2 id="projects-title" class="projects__title"></h2>
            <ul class="projects__list">
                
                <!-- Currículum -->
                <li class="projects__item">
                    <div class="projects__item-header">
                        <h3 class="projects__item-title" data-i18n="projects.items.resume.title"></h3>
                        <img class="projects__item-image" src="./assets/img/projects/curriculum.png" alt="CV digital">
                    </div>
                    <div class="projects__item-info">
                        <p class="projects__item-description" data-i18n="projects.items.resume.description"></p>
                        <div class="projects__item-keypad">
                            <a class="projects__item-button" href="https://github.com/azocarone/curriculum/" target="_blank"
                                rel="noopener noreferrer" aria-label="Ver código en GitHub">
                                <i class="fab fa-github"></i> GitHub
                            </a>
                            <a class="projects__item-button" href="https://curriculum.joseazocar.pro/" target="_blank"
                                rel="noopener noreferrer" aria-label="Ver demo del proyecto">
                                <i class="fas fa-eye"></i> Demo
                            </a>
                        </div>
                    </div>
                </li>
                
                <!-- Portafolio -->
                <li class="projects__item">
                    <div class="projects__item-header">
                        <h3 class="projects__item-title" data-i18n="projects.items.portfolio.title"></h3>
                        <img class="projects__item-image" src="./assets/img/projects/portafolio.png"
                        alt="Portafolio - Vitrina online de un Profesional IT">
                    </div>
                    <div class="projects__item-info">
                        <p class="projects__item-description" data-i18n="projects.items.portfolio.description"></p>
                        <div class="projects__item-keypad">
                            <a class="projects__item-button" href="https://github.com/azocarone/portafolio/" target="_blank"
                                rel="noopener noreferrer" aria-label="Ver código en GitHub"> 
                                <i class="fab fa-github"></i> GitHub</a>
                            <a class="projects__item-button" href="https://joseazocar.pro/" target="_blank" 
                                rel="noopener noreferrer" aria-label="Ver demo del proyecto">
                                <i class="fas fa-eye"></i> Demo
                            </a>
                        </div>
                    </div>
                </li>
            </ul>
        </section>

        <!-- Contacto -->
        <section class="main__section contact" id="contact" data-aos="fade-up">
            <div class="contact__header">
                <h2 class="contact__title" data-i18n="contact.title"></h2>
                <p class="contact__description" data-i18n="contact.promo1"></p>
                <p class="contact__description" data-i18n="contact.promo2"></p>
                <img class="contact__image" src="./assets/img/contact/wfh.png" alt="Imagen de contacto - Working from home">
            </div>
            <div class="contact__content">
                <form class="contact__form" id="contactForm" aria-label="Formulario de contacto para WhatsApp">
                    <fieldset class="contact__fieldset" aria-label="Formulario de Contacto">
                        
                        <div class="contact__field">
                            <label class="contact__label" for="name" data-i18n="contact.form.name.label"></label>
                            <input class="contact__input" type="text" id="name" name="name"
                                required pattern="^(?!\s*$).+" maxlength="50"
                                data-tipo="name" data-i18n-placeholder="contact.form.name.placeholder">
                            <span class="contact__error" role="alert"></span>
                        </div>
                        
                        <div class="contact__field">
                            <label class="contact__label" for="email" data-i18n="contact.form.email.label"></label>
                            <input class="contact__input" type="email" id="email" name="email"
                                required data-tipo="email"
                                data-i18n-placeholder="contact.form.email.placeholder">
                            <span class="contact__error" role="alert"></span>
                        </div>
                        
                        <div class="contact__field">
                            <label class="contact__label" for="subject" data-i18n="contact.form.subject.label"></label>
                            <input class="contact__input" type="text" id="subject" name="subject"
                                required pattern="^(?!\s*$).+" maxlength="50"
                                data-tipo="subject" data-i18n-placeholder="contact.form.subject.placeholder">
                            <span class="contact__error" role="alert"></span>
                        </div>
                        
                        <div class="contact__field">
                            <label class="contact__label" for="message" data-i18n="contact.form.message.label"></label>
                            <textarea class="contact__input contact__input--textarea" id="message" name="message"
                                required rows="6" maxlength="300"
                                data-tipo="message" data-i18n-placeholder="contact.form.message.placeholder"></textarea>
                            <span class="contact__error" role="alert"></span>
                        </div>
                    </fieldset>

                    <div class="contact__recaptcha">
                        <div class="g-recaptcha" data-sitekey="6LegnwcrAAAAAFCSVxZPSTuVba6f3-tA69p8mnrb" data-callback="onRecaptchaSuccess"
                            data-expired-callback="onRecaptchaExpired">
                        </div>
                        <button class="contact__button" type="submit" disabled data-i18n="contact.form.submit"></button>
                    </div>
                </form>
            </div>
        </section>
    </main>
